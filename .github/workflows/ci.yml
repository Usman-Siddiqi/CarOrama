name: Validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  core-tests:
    name: Core and adapter build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CarOrama.sln

      - name: Build and test
        run: dotnet test CarOrama.sln --configuration Release --no-restore

